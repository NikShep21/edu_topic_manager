server {
    listen 80;
    server_name nikshep.ru www.nikshep.ru;

    location /static/ {
        alias /static/;
        autoindex off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name nikshep.ru www.nikshep.ru;

    ssl_certificate /etc/letsencrypt/live/nikshep.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nikshep.ru/privkey.pem;

    location /static/ {
        alias /static/;
        autoindex off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /api/ {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
    }

    location / {
        proxy_pass http://frontend:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
    }
}
