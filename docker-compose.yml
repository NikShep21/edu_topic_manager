services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn EduTopicManager.wsgi:application --bind 0.0.0.0:8000
      "
    env_file:
      - .env
    volumes:
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build: ./frontend

  nginx:
    build: ./nginx
    volumes:
      - static_data:/static
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_data:
