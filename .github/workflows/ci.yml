name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: edu_topic_manager_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d edu_topic_manager_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SECRET_KEY: test-secret-key
      DEBUG: "1"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: edu_topic_manager_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: 5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: lint
        run: flake8 .

      - name: format check
        run: black --check .

      - name: django check
        run: python manage.py check

      - name: migrations check
        run: python manage.py makemigrations --check --dry-run

      - name: apply migrations
        run: python manage.py migrate --noinput

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: install dependencies
        run: npm ci

      - name: lint
        run: npm run lint

      - name: format check
        run: npm run format:check

      - name: type check
        run: npm run typecheck

      - name: test
        run: npm test

      - name: build
        run: npm run build
