name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read 

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: '22' 
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: install dependencies
      run: npm ci
      
    - name: lint
      run: npm run lint


    - name: format check
      run: npm run format:check

    - name: type check
      run: npm run typecheck

    - name: test
      run: npm test

    - name: build 
      run: npm run build


