# backend/pyproject.toml
[tool.black]
line-length = 88
target-version = ['py312']
skip-string-normalization = true

[tool.flake8]
max-line-length = 88
extend-ignore = "E501,W503"
exclude = [
    ".git",
    "__pycache__",
    "migrations",
    "*.pyc",
    "manage.py",
]
per-file-ignores = [
    "migrations/*=F403,F405",
]
